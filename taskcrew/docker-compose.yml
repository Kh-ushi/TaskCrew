version: "3.9"

services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/.env
    volumes:
      - ./auth-service:/app
    depends_on:
      - redis

  project-service:
    build:
      context: ./project-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - ./project-service/.env
    volumes:
      - ./project-service:/app
    depends_on:
      - redis

  redis:
    image: redis:latest
    container_name: redis 
    ports:
      - "6379:6379"
