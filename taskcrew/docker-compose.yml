services:

  api-gateway:
    build:
     context: ./api-gateway
     dockerfile: Dockerfile
    ports:
     - "3000:3000"
    env_file:
     - ./api-gateway/.env
    volumes :
     - ./api-gateway/:app   


  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/.env
    volumes:
      - ./auth-service:/app
    depends_on:
      - redis

