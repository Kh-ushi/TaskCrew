version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: taskcrew-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]

volumes:
  redis-data: {}
